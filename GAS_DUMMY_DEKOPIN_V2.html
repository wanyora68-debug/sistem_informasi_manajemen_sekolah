<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMS KCD XI - Manajemen Sekolah Digital</title>
  
  <!-- CSS & FONTS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- REACT & LIBRARIES -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .scroll-hide::-webkit-scrollbar { display: none; }
    .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { background: white !important; padding: 0 !important; margin: 0 !important; }
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { motion, AnimatePresence } = window.framerMotion;

    // Helper to call GAS functions
    function callGAS(funcName, ...args) {
      return new Promise((resolve, reject) => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)[funcName](...args);
        } else {
          console.warn(`Calling ${funcName} in local mode (GAS not detected)`);
          resolve(null);
        }
      });
    }

    // Lucide Icon Component Helper
    const Icon = ({ name, className = "w-5 h-5" }) => {
      useEffect(() => { lucide.createIcons(); }, []);
      return <i data-lucide={name} className={className}></i>;
    };

    // --- COMPONENTS --- (Bento Menu, Navigation, etc.)

    const NavTab = ({ icon, label, active, onClick }) => (
      <button 
        onClick={onClick}
        className={`flex items-center gap-2 px-6 py-4 transition-all duration-300 relative ${active ? 'text-white' : 'text-blue-200 hover:text-white hover:bg-blue-700/50'}`}
      >
        <span className={`${active ? 'scale-110' : 'scale-100'} transition-transform`}>{icon}</span>
        <span className={`text-[10px] font-black uppercase tracking-widest ${active ? 'opacity-100' : 'opacity-80'}`}>{label}</span>
        {active && <motion.div layoutId="nav-underline" className="absolute bottom-0 left-0 right-0 h-1 bg-yellow-400" />}
      </button>
    );

    // --- MAIN APPLICATION ---

    function App() {
      const [currentPage, setCurrentPage] = useState('landing');
      const [activeTab, setActiveTab] = useState('home');
      const [activeUser, setActiveUser] = useState(null);
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [selectedRole, setSelectedRole] = useState('Guru');
      
      // States for Data
      const [classList, setClassList] = useState([]);
      const [studentList, setStudentList] = useState([]);
      const [schoolSettings, setSchoolSettings] = useState({ nama: "SMKN 4 GARUT", jamMasuk: "07:00", jamPulang: "15:00" });
      const [currentTime, setCurrentTime] = useState(new Date());

      // Absensi Siswa States
      const [absensiSiswaDate, setAbsensiSiswaDate] = useState(new Date().toISOString().split('T')[0]);
      const [selectedKelas, setSelectedKelas] = useState('');
      const [mapelSiswa, setMapelSiswa] = useState('');
      const [attendanceRecords, setAttendanceRecords] = useState({});
      const [viewModeAbsensi, setViewModeAbsensi] = useState('input');
      const [laporanAbsensiData, setLaporanAbsensiData] = useState([]);
      const [isFetchingLaporan, setIsFetchingLaporan] = useState(false);

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const loadData = async () => {
        try {
          const classes = await callGAS('getDaftarKelasFull');
          setClassList(classes || []);
          const students = await callGAS('getDaftarSiswa');
          setStudentList(students || []);
        } catch (e) {
          console.error("Data load failed", e);
        }
      };

      const handleLogin = async (email, pass) => {
        try {
          const res = await callGAS('prosesLogin', email, pass, selectedRole);
          if (res.status === 'success') {
            setActiveUser(res.user);
            setCurrentPage('dashboard');
            loadData();
          } else {
            alert(res.message);
          }
        } catch (e) {
          alert("Login error");
        }
      };

      const handleFetchLaporan = async () => {
        if (!selectedKelas) return alert("Pilih kelas!");
        setIsFetchingLaporan(true);
        try {
          const data = await callGAS('getLaporanAbsensiSiswa', absensiSiswaDate, selectedKelas);
          setLaporanAbsensiData(data || []);
          if (data && data.length > 0) setViewModeAbsensi('laporan');
          else alert("Laporan tidak ditemukan.");
        } finally {
          setIsFetchingLaporan(false);
        }
      };

      if (currentPage === 'landing') {
        return (
          <div className="min-h-screen bg-blue-900 flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-700 via-blue-900 to-slate-900">
             <div className="max-w-md w-full bg-white/10 backdrop-blur-xl p-10 rounded-[3rem] border border-white/20 shadow-2xl text-center">
                <div className="w-24 h-24 bg-white rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl">
                   <Icon name="school" className="w-12 h-12 text-blue-900" />
                </div>
                <h1 className="text-4xl font-black text-white mb-2 tracking-tighter italic">SIMS KCD XI</h1>
                <p className="text-blue-200 text-xs font-bold uppercase tracking-[0.3em] mb-10">Sistem Informasi Manajemen Sekolah</p>
                
                <div className="space-y-4">
                   <button 
                     onClick={() => setShowLoginModal(true)}
                     className="w-full bg-yellow-400 hover:bg-yellow-500 text-blue-900 py-6 rounded-2xl font-black text-lg shadow-xl shadow-yellow-400/20 active:scale-95 transition-all"
                   >
                     MULAI DIGITALISASI
                   </button>
                   <p className="text-blue-300/50 text-[10px] font-bold uppercase tracking-widest">Digital Service for Better Education</p>
                </div>
             </div>

             {showLoginModal && (
               <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm">
                 <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl">
                    <div className="flex justify-between items-center mb-8">
                       <h2 className="text-2xl font-black text-blue-950 italic">LOGIN AKSES</h2>
                       <button onClick={() => setShowLoginModal(false)} className="bg-slate-100 p-2 rounded-full"><Icon name="x" className="w-4 h-4" /></button>
                    </div>
                    
                    <div className="flex gap-2 mb-8 bg-slate-50 p-1 rounded-2xl">
                      {['Guru', 'Operator'].map(role => (
                        <button 
                          key={role}
                          onClick={() => setSelectedRole(role)}
                          className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${selectedRole === role ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400'}`}
                        >
                          {role}
                        </button>
                      ))}
                    </div>

                    <form className="space-y-4" onSubmit={(e) => {
                      e.preventDefault();
                      handleLogin(e.target.email.value, e.target.pass.value);
                    }}>
                      <div className="space-y-1">
                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Email Akun</label>
                        <input name="email" type="email" placeholder="example@email.com" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold focus:border-blue-500 outline-none" required />
                      </div>
                      <div className="space-y-1">
                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Password</label>
                        <input name="pass" type="password" placeholder="••••••••" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold focus:border-blue-500 outline-none" required />
                      </div>
                      <button className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition shadow-blue-100">AUTHENTIKASI</button>
                    </form>
                 </div>
               </div>
             )}
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
           {/* HEADER */}
           <header className="bg-blue-950 text-white p-5 flex items-center justify-between shadow-2xl sticky top-0 z-[60]">
             <div className="flex items-center gap-4">
                <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-blue-900 shadow-lg">
                  <Icon name="school" className="w-7 h-7" />
                </div>
                <div>
                  <h1 className="text-xl font-black italic tracking-tighter">SIMS KCD XI</h1>
                  <p className="text-[9px] font-bold text-blue-400 uppercase tracking-[0.2em]">{activeUser?.nama} | {activeUser?.sekolah}</p>
                </div>
             </div>
             <button onClick={() => setCurrentPage('landing')} className="bg-red-500 text-white px-6 py-2.5 rounded-full text-[10px] font-black shadow-xl shadow-red-500/20 flex items-center gap-2 active:scale-95 transition-all">
                <Icon name="log-out" className="w-3 h-3" /> LOGOUT
             </button>
           </header>

           {/* NAVIGATION */}
           <nav className="bg-blue-900 flex overflow-x-auto scroll-hide sticky top-[80px] z-50">
              <NavTab icon={<Icon name="home" />} label="BERANDA" active={activeTab === 'home'} onClick={() => setActiveTab('home')} />
              <NavTab icon={<Icon name="users" />} label="ABSEN SISWA" active={activeTab === 'absensi-siswa'} onClick={() => setActiveTab('absensi-siswa')} />
              <NavTab icon={<Icon name="book-open" />} label="JURNAL" active={activeTab === 'jurnal'} onClick={() => setActiveTab('jurnal')} />
              <NavTab icon={<Icon name="user" />} label="PROFIL" active={activeTab === 'profil'} onClick={() => setActiveTab('profil')} />
           </nav>

           {/* CONTENT */}
           <main className="flex-1 p-6 lg:p-10 max-w-7xl mx-auto w-full">
              {activeTab === 'absensi-siswa' && (
                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-blue-50 animate-fadeIn">
                   <div className="flex flex-col md:flex-row justify-between items-center gap-6 mb-10 pb-6 border-b border-slate-100">
                      <div className="flex items-center gap-4">
                         <div className="p-4 bg-blue-600 rounded-3xl text-white shadow-xl shadow-blue-100">
                            <Icon name="users" className="w-8 h-8" />
                         </div>
                         <div>
                            <h2 className="text-2xl font-black text-blue-950 uppercase">ABSENSI SISWA</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Manajemen Kehadiran Digital</p>
                         </div>
                      </div>
                      <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                         <button onClick={() => setViewModeAbsensi('input')} className={`px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${viewModeAbsensi === 'input' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>INPUT ABSENSI</button>
                         <button onClick={() => setViewModeAbsensi('laporan')} className={`px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${viewModeAbsensi === 'laporan' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>LIHAT LAPORAN</button>
                      </div>
                   </div>

                   {viewModeAbsensi === 'input' ? (
                     <div className="space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                           <div className="bg-blue-50 p-6 rounded-[2rem] border border-blue-100">
                             <label className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2 block px-2">Tanggal</label>
                             <input type="date" value={absensiSiswaDate} onChange={e => setAbsensiSiswaDate(e.target.value)} className="w-full p-4 bg-white rounded-2xl border-none font-black text-blue-900 shadow-inner" />
                           </div>
                           <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-200">
                             <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block px-2">Pilih Kelas</label>
                             <select value={selectedKelas} onChange={e => setSelectedKelas(e.target.value)} className="w-full p-4 bg-white rounded-2xl border-none font-black text-blue-950 appearance-none">
                               <option value="">-- PILIH KELAS --</option>
                               {classList.map(c => <option key={c.id} value={c.nama}>{c.nama}</option>)}
                             </select>
                           </div>
                           <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-200">
                             <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block px-2">Mata Pelajaran</label>
                             <input value={mapelSiswa} onChange={e => setMapelSiswa(e.target.value)} placeholder="Contoh: Matematika" className="w-full p-4 bg-white rounded-2xl border-none font-black text-blue-950" />
                           </div>
                        </div>

                        {selectedKelas ? (
                          <div className="border shadow-inner p-6 rounded-[2.5rem]">
                             <div className="grid gap-3 max-h-[500px] overflow-y-auto pr-2 scroll-hide">
                               {studentList.filter(s => s.kelas === selectedKelas).map((s, idx) => {
                                 const sid = s.row || s.id;
                                 return (
                                   <div key={idx} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-blue-300 transition-all">
                                      <div className="flex flex-col">
                                         <span className="text-xs font-black text-slate-800 uppercase">{s.nama}</span>
                                         <span className="text-[9px] font-bold text-slate-400 tracking-widest">NIS: {s.nis}</span>
                                      </div>
                                      <div className="flex gap-1">
                                        {['H', 'S', 'I', 'A'].map(status => (
                                          <button 
                                            key={status}
                                            onClick={() => setAttendanceRecords(prev => ({ ...prev, [sid]: status }))}
                                            className={`w-10 h-10 rounded-xl font-black text-[10px] flex items-center justify-center transition-all ${attendanceRecords[sid] === status ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400'}`}
                                          >
                                            {status}
                                          </button>
                                        ))}
                                      </div>
                                   </div>
                                 );
                               })}
                             </div>
                             <button onClick={() => alert("Data akan disinkronkan ke Cloud...")} className="w-full bg-blue-950 text-white py-6 rounded-[2rem] mt-10 font-black text-lg shadow-2xl flex items-center justify-center gap-4 uppercase tracking-[0.2em] shadow-blue-950/20 active:scale-95 transition-all">
                                <Icon name="save" className="w-6 h-6" /> SIMPAN ABSENSI DIGITAL
                             </button>
                          </div>
                        ) : (
                          <div className="text-center py-20 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[3rem]">
                             <Icon name="alert-circle" className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                             <p className="text-sm font-black text-slate-400 uppercase tracking-widest">Silakan pilih kelas untuk memuat daftar siswa</p>
                          </div>
                        )}
                     </div>
                   ) : (
                     <div className="space-y-10">
                        <div className="bg-indigo-50 p-8 rounded-[2.5rem] border border-indigo-100 flex flex-wrap items-end gap-6">
                           <div className="flex-1 min-w-[200px]">
                              <label className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2 block ml-2">Pilih Tanggal Laporan</label>
                              <input type="date" value={absensiSiswaDate} onChange={e => setAbsensiSiswaDate(e.target.value)} className="w-full p-4 bg-white rounded-2xl border-none font-black text-indigo-900" />
                           </div>
                           <div className="flex-1 min-w-[200px]">
                              <label className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2 block ml-2">Pilih Kelas</label>
                              <select value={selectedKelas} onChange={e => setSelectedKelas(e.target.value)} className="w-full p-4 bg-white rounded-2xl border-none font-black text-indigo-900">
                                <option value="">-- KELAS --</option>
                                {classList.map(c => <option key={c.id} value={c.nama}>{c.nama}</option>)}
                              </select>
                           </div>
                           <button onClick={handleFetchLaporan} disabled={isFetchingLaporan} className="bg-indigo-600 text-white px-10 py-5 rounded-2xl font-black text-[10px] shadow-xl shadow-indigo-100 active:scale-95 uppercase tracking-widest transition-all">
                              {isFetchingLaporan ? "MEMPROSES..." : "MUAT DATA LAPORAN"}
                           </button>
                        </div>

                        {laporanAbsensiData.length > 0 ? (
                           <div className="space-y-8">
                             {laporanAbsensiData.map((l, i) => (
                               <div key={i} className="bg-white border-2 border-slate-100 rounded-[3rem] p-10 shadow-sm">
                                  <div className="flex flex-col md:flex-row justify-between items-center gap-6 mb-10 pb-8 border-b-2 border-dotted border-slate-100">
                                     <div className="flex items-center gap-4">
                                        <div className="w-16 h-16 bg-slate-900 text-white rounded-2xl flex items-center justify-center">
                                          <Icon name="printer" className="w-8 h-8" />
                                        </div>
                                        <div>
                                          <h4 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">BUKTI ABSENSI DIGITAL</h4>
                                          <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1 italic">Status: Terverifikasi Sistem SIMS v2.0.7</p>
                                        </div>
                                     </div>
                                     <button onClick={() => window.print()} className="bg-slate-900 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-3 shadow-xl active:scale-95 no-print">
                                        <Icon name="download" className="w-4 h-4" /> CETAK / SIMPAN PDF
                                     </button>
                                  </div>

                                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                                     {[
                                       { label: 'TANGGAL', val: new Date(l.tanggal).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }) },
                                       { label: 'KELAS', val: l.kelas },
                                       { label: 'HARI', val: l.hari },
                                       { label: 'MATA PELAJARAN', val: l.mapel }
                                     ].map(info => (
                                       <div className="bg-slate-50/50 p-5 rounded-2xl border border-slate-100">
                                          <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">{info.label}</p>
                                          <p className="text-sm font-black text-slate-900 uppercase">{info.val}</p>
                                       </div>
                                     ))}
                                  </div>

                                  <div className="border border-slate-100 rounded-3xl overflow-hidden mb-10">
                                     <table className="w-full text-left text-[11px] border-collapse">
                                        <thead className="bg-slate-900 text-white">
                                           <tr>
                                              <th className="p-5 font-black uppercase text-center w-16 border-r border-slate-700">NO</th>
                                              <th className="p-5 font-black uppercase border-r border-slate-700">BIODATA SISWA (NAMA & NIS)</th>
                                              <th className="p-5 font-black uppercase text-center w-32">KETERANGAN</th>
                                           </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 italic">
                                           {Object.entries(l.absensi || {}).map(([nama, stat], idx) => (
                                             <tr key={idx} className={idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/30'}>
                                                <td className="p-5 font-black text-slate-300 text-center border-r border-slate-50">{idx+1}</td>
                                                <td className="p-5 font-black text-slate-800 uppercase border-r border-slate-50">{nama}</td>
                                                <td className="p-5 text-center">
                                                  <span className={`inline-block px-3 py-1.5 rounded-lg font-black text-[9px] min-w-[70px] uppercase tracking-tighter ${stat==='H'?'bg-green-100 text-green-700':stat==='S'?'bg-blue-100 text-blue-700':stat==='I'?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-700'}`}>
                                                    {stat === 'H' ? 'HADIR' : stat === 'S' ? 'SAKIT' : stat === 'I' ? 'IZIN' : 'ALPA'}
                                                  </span>
                                                </td>
                                             </tr>
                                           ))}
                                        </tbody>
                                     </table>
                                  </div>

                                  <div className="flex justify-end pr-10 mt-16 text-center space-y-20 flex-col w-64 ml-auto">
                                     <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Dicetak oleh Digital System,</p>
                                     <div className="border-b-2 border-slate-900 pb-1">
                                       <p className="text-xs font-black text-slate-900 uppercase">{l.guru}</p>
                                     </div>
                                     <p className="text-[8px] font-black text-indigo-400 uppercase tracking-[0.3em] font-mono">CODE: {Math.random().toString(36).substring(7).toUpperCase()}</p>
                                  </div>
                               </div>
                             ))}
                           </div>
                        ) : (
                          <div className="text-center py-40 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[4rem]">
                             <Icon name="printer" className="w-20 h-20 text-slate-200 mx-auto mb-6" />
                             <h4 className="text-xl font-black text-slate-300 uppercase tracking-widest italic">Arsip Laporan Digital</h4>
                             <p className="text-xs text-slate-400 font-bold uppercase mt-2 max-w-sm mx-auto">Gunakan filter filter di atas untuk menarik data rekaman absensi harian dari database sekolah.</p>
                          </div>
                        )}
                     </div>
                   )}
                </div>
              )}

              {activeTab === 'home' && (
                <div className="animate-fadeIn">
                   <div className="p-12 bg-white rounded-[4rem] shadow-2xl text-center border-b-[12px] border-blue-600 relative overflow-hidden">
                      <div className="absolute top-0 right-0 p-10 opacity-5">
                         <Icon name="school" className="w-64 h-64" />
                      </div>
                      <h2 className="text-5xl font-black text-blue-950 italic tracking-tighter mb-4 leading-none">SELAMAT DATANG DI SIMS</h2>
                      <p className="text-blue-500 font-bold uppercase tracking-[0.4em] mb-12 text-xs">Pusat Manajemen Berbasis Cloud & Real-time</p>
                      
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                         <div className="p-8 bg-blue-50 rounded-[3rem] border border-blue-100 flex flex-col items-center group hover:bg-blue-600 hover:text-white transition-all transform hover:-translate-y-2 lg:duration-500">
                            <Icon name="users" className="w-12 h-12 mb-4" />
                            <h3 className="font-black text-lg">SISWA</h3>
                            <p className="text-[10px] font-bold uppercase tracking-widest opacity-60">{studentList.length} Terdaftar</p>
                         </div>
